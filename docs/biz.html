<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Финансы</title><link rel="stylesheet" href="./styles.css"><link rel="stylesheet" href="./business.css"><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script><script src="./config.js"></script></head><body><main class="page"><header class="header"><div><p class="eyebrow">Notion finance</p><h1>Финансы</h1><p class="subtitle" id="lastUpdated">Автообновление из Notion</p></div><button id="refreshButton" class="button">Обновить</button></header><section id="status" class="status visible">Загружаю данные…</section><section class="kpi-grid"><article class="kpi-card"><span>Доходы</span><strong id="totalIncome">—</strong></article><article class="kpi-card"><span>Расходы</span><strong id="totalExpenses">—</strong></article><article class="kpi-card"><span>Баланс</span><strong id="netBalance">—</strong></article><article class="kpi-card"><span>Трат</span><strong id="expenseCount">—</strong></article></section><section class="grid"><article class="chart-card wide"><div class="card-head"><h2>Денежный поток</h2><p id="monthlyInsight">Доходы, расходы и баланс</p></div><canvas id="monthlyChart"></canvas></article><article class="chart-card"><div class="card-head"><h2>Куда уходят деньги</h2><p id="categoryInsight">Топ расходов</p></div><canvas id="categoryChart"></canvas></article><article class="chart-card"><div class="card-head"><h2>Источники дохода</h2><p id="incomeInsight">Структура поступлений</p></div><canvas id="incomeSourceChart"></canvas></article><article class="chart-card"><div class="card-head"><h2>Кто тратит</h2><p id="payerInsight">Распределение</p></div><canvas id="payerChart"></canvas></article><article class="chart-card"><div class="card-head"><h2>Тип расходов</h2><p id="typeInsight">Структура</p></div><canvas id="expenseTypeChart"></canvas></article><article class="chart-card wide"><div class="card-he
